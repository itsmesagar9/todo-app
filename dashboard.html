<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Todo Pro</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
        <h2>Todo Pro</h2>

        <div>
            <input type="text" id="searchInput" placeholder="Search tasks...">
            <button id="logoutBtn">Logout</button>
        </div>
    </header>

    <!-- ================= MAIN ================= -->
    <div class="dashboard">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar">

            <h3>Lists</h3>

            <ul id="listContainer"></ul>

            <button id="addListBtn">+ New List</button>

        </aside>

        <!-- ===== TASK AREA ===== -->
        <main class="task-area">
            <!-- ================= TASK MODAL ================= -->
            <div id="taskModal" class="modal hidden">
                <div class="modal-box large">

                    <h3 id="modalTitle">Add Task</h3>

                    <input type="text" id="taskTitle" placeholder="Task Title">

                    <textarea id="taskDesc" placeholder="Description"></textarea>

                    <!-- STATUS -->
                    <select id="taskStatus">
                        <option>Not Started</option>
                        <option>In Progress</option>
                        <option>Completed</option>
                        <option>Delayed</option>
                    </select>

                    <!-- DATE TIME -->
                    <label>Start</label>
                    <input type="datetime-local" id="taskStart">

                    <label>End</label>
                    <input type="datetime-local" id="taskEnd">

                    <label>Secondary Start</label>
                    <input type="datetime-local" id="taskSecStart">

                    <label>Secondary End</label>
                    <input type="datetime-local" id="taskSecEnd">

                    <!-- RECURRING -->
                    <select id="taskRecurring">
                        <option value="no">One-time</option>
                        <option value="daily">Daily</option>
                    </select>

                    <!-- REASON -->
                    <select id="taskReason">
                        <option>Study</option>
                        <option>Work</option>
                        <option>Health</option>
                        <option>Personal</option>
                        <option>Urgent</option>
                        <option>Other</option>
                    </select>

                    <input type="text" id="customReason" placeholder="Custom reason" class="hidden">

                    <!-- ACTIONS -->
                    <div class="modal-actions">
                        <button id="saveTaskBtn">Save Task</button>
                        <button onclick="closeTaskModal()">Cancel</button>
                    </div>

                </div>
            </div>
            <div class="task-header">
                <h3 id="currentList">Select a List</h3>

                <select id="filterStatus">
                    <option value="">All</option>
                    <option>Not Started</option>
                    <option>In Progress</option>
                    <option>Completed</option>
                    <option>Delayed</option>
                </select>

                <button id="addTaskBtn">+ Task</button>
            </div>

            <div id="taskContainer" class="task-container"></div>

            <!-- EMPTY STATE -->
            <div id="emptyState" class="empty hidden">
                <p>No tasks yet</p>
            </div>

        </main>

    </div>

    <!-- ================= FOOTER ================= -->
    <footer>
        <p>© Sagar Dulal</p>
    </footer>

    <!-- ================= JS ================= -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
