<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Pro - Login</title>

<link rel="stylesheet" href="css/style.css">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= LOADER ================= -->
<div id="loader">
  <div class="loader-box">
    <h2>Loading...</h2>
    <div id="progress">0%</div>
  </div>
</div>

<!-- ================= MAIN CONTAINER ================= -->
<div class="container">

  <!-- ================= LEFT INFO PANEL ================= -->
  <div class="info-panel">
    <h1>Todo Pro</h1>
    <p>Organize your tasks like a professional SaaS tool.</p>
  </div>

  <!-- ================= AUTH BOX ================= -->
  <div class="auth-box">

    <!-- TOGGLE BUTTONS -->
    <div class="toggle">
      <button id="showLogin">Login</button>
      <button id="showRegister">Register</button>
    </div>

    <!-- ================= LOGIN FORM ================= -->
    <div id="loginForm">

      <h2>Login</h2>

      <input type="email" id="loginEmail" placeholder="Email">

      <div class="password-box">
        <input type="password" id="loginPassword" placeholder="Password">
        <span onclick="togglePassword('loginPassword')">👁</span>
      </div>

      <button id="loginBtn">Login</button>

    </div>

    <!-- ================= REGISTER FORM ================= -->
    <div id="registerForm" class="hidden">

      <h2>Create Account</h2>

      <input type="text" id="username" placeholder="Username (letters + numbers)">
      <input type="text" id="fullname" placeholder="Full Name">
      <input type="email" id="email" placeholder="Email">
      <input type="text" id="phone" placeholder="Phone Number">

      <div class="password-box">
        <input type="password" id="password" placeholder="Password">
        <span onclick="togglePassword('password')">👁</span>
      </div>

      <div class="password-box">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <span onclick="togglePassword('confirmPassword')">👁</span>
      </div>

      <label>
        <input type="checkbox" id="agree">
        I agree to <a href="terms.html" target="_blank">Terms & Conditions</a>
      </label>

      <button id="registerBtn">Register</button>

    </div>

  </div>
</div>

<!-- ================= OTP MODAL (DYNAMIC) ================= -->
<div id="otpContainer"></div>

<!-- ================= SCRIPTS ================= -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/loader.js"></script>

<!-- ================= PASSWORD TOGGLE ================= -->
<script>
function togglePassword(id) {
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
